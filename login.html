<!DOCTYPE html>
<html>
<head>
<title>Admin Login - MeghJobs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div style="max-width:400px;margin:100px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1);">

<h2 style="text-align:center;">Admin Login</h2>

<input type="text" id="username" placeholder="Username"
style="width:100%;padding:12px;margin:10px 0;">

<input type="password" id="password" placeholder="Password"
style="width:100%;padding:12px;margin:10px 0;">

<button onclick="login()"
style="width:100%;padding:12px;background:#00A86B;color:white;border:none;border-radius:5px;">
Login
</button>

</div>

<script src="auth.js"></script>

</body>
</html>
